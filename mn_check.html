<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>암기코드 점검 — CertLab</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F6F8FB;color:#1F2937;padding:18px;line-height:1.5}
  h1{font-size:18px;margin:0 0 4px}
  .sub{font-size:12.5px;color:#6B7280;margin-bottom:14px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .btn{padding:9px 16px;border-radius:10px;border:none;background:#185FA5;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
  .btn.sec{background:#EEF2F7;color:#334155}
  #status{font-size:12.5px;color:#185FA5;font-weight:600}
  .sec{background:#fff;border:1px solid #E8EDF3;border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .sec h2{font-size:14.5px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .cnt{font-size:12px;font-weight:800;padding:2px 9px;border-radius:20px}
  .cnt.ok{background:#E8F8F1;color:#0F6E56}
  .cnt.warn{background:#FDE7C9;color:#9A5B00}
  .cnt.err{background:#FDE2E1;color:#A32D2D}
  .desc{font-size:12px;color:#94A3B8;margin-bottom:8px}
  .row{padding:8px 10px;border:1px solid #EEF1F5;border-radius:9px;margin-bottom:6px;font-size:13px}
  .row .k{font-family:monospace;font-weight:700}
  .row .meta{font-size:11px;color:#94A3B8;margin-top:2px}
  .chant{color:#C0322F;font-weight:800;letter-spacing:1px}
  .gobtn{display:inline-block;margin-top:5px;padding:4px 10px;border-radius:7px;background:#185FA5;color:#fff;text-decoration:none;font-size:11.5px;font-weight:700}
  .empty{color:#94A3B8;font-size:12.5px;padding:6px 2px}
  .pill{display:inline-block;font-family:monospace;font-size:11px;background:#F1F5F9;color:#475569;border-radius:6px;padding:1px 7px;margin:1px 3px 1px 0}
  select{padding:8px 11px;border:1px solid #CBD5E1;border-radius:9px;background:#fff;color:#1F2937;font-size:13px}
  .subgrp{border:1px solid #E2E8F0;border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#FBFDFF}
  .subgrp .shd{font-size:13px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .subgrp .smeta{font-size:11px;color:#94A3B8;font-weight:600}
  .codeline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:5px 8px;border:1px solid #EEF1F5;border-radius:8px;margin-bottom:4px;font-size:12.5px;background:#fff}
  .codeline .id{font-family:monospace;font-weight:700;color:#185FA5}
  .codeline .ok{color:#0F6E56;font-weight:700}
  .codeline .bad{color:#A32D2D;font-weight:700}
  .codeline .x{color:#64748B;font-size:11px}
  /* ===== 앱(index.html)과 동일한 암기코드 박스 렌더 ===== */
  .mn-box{margin:8px 0 0;padding:10px 13px;background:linear-gradient(135deg,#FFF6E9,#FFEFD6);border:1px solid #F1D9A8;border-radius:12px}
  .mn-ti{font-size:12px;font-weight:800;color:#B97A12;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #F5E6C8}
  .mn-code{font-size:13.5px;font-weight:400;color:#5E4A2A}
  .mn-desc{font-size:13px;font-weight:400;color:#5E4A2A;line-height:1.75;margin-top:5px}
  .mn-code .k,.mn-desc .k,.mn-code k,.mn-desc k{color:#C0392B;font-weight:800}
  .mn-chant{margin-top:5px;margin-bottom:6px;font-size:14px;font-weight:800;color:#C0392B;letter-spacing:1px}
  .mnentry{margin-bottom:10px}
  .enmeta{font-size:11px;color:#94A3B8;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .enmeta .src{font-family:monospace;background:#F1F5F9;border-radius:5px;padding:1px 6px;color:#475569}
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
<h1>📑 암기코드 점검</h1>
<div class="sub">전 과목 문항의 <b>mn://</b> 참조와 마스터(mnemonics)를 대조합니다. 깨진 참조·미사용 코드·중복 두문자·직접입력(이관 후보)을 잡아냅니다.</div>
<div class="bar">
  <button class="btn" onclick="scanAll()">전체 스캔</button>
  <button class="btn sec" onclick="location.reload()">초기화</button>
  <select id="mnSubSel" style="display:none" onchange="render()"><option value="">전체 과목</option></select>
  <span id="status">"전체 스캔"을 누르면 마스터 + 전 과목 banks를 읽어 대조합니다.</span>
</div>
<div id="out"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab-c3bcb.firebaseapp.com",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.firebasestorage.app",
  messagingSenderId: "698827699707",
  appId: "1:698827699707:web:b08d492f408ac444fa875e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const SITE = 'https://certlab.ai.kr/';

// 엔진/img_check와 동일한 시험·과목 레지스트리 (★엔진에 시험·과목 추가 시 여기도 갱신)
const REGISTRY=[
  {id:'appraiser', name:'감정평가사', subs:[{code:'civil',name:'민법'},{code:'law',name:'감정평가관계법규'},{code:'econ',name:'경제학원론'},{code:'acct',name:'회계학'},{code:'real',name:'부동산학원론'}]},
  {id:'realestate1', name:'공인중개사 1차', subs:[{code:'re1_intro',name:'부동산학개론'},{code:'re1_civil',name:'민법 및 민사특별법'}]},
  {id:'realestate2', name:'공인중개사 2차', subs:[{code:'re2_law',name:'공인중개사법령 및 중개실무'},{code:'re2_public',name:'부동산공법'},{code:'re2_tax',name:'부동산공시법령 및 세법'}]},
  {id:'koreanhistory', name:'한국사능력검정시험 심화', subs:[{code:'ksh',name:'한국사 심화'}]},
  {id:'housing', name:'주택관리사 1차', subs:[{code:'hm_acct',name:'회계원리'},{code:'hm_fac',name:'공동주택시설개론'},{code:'hm_civil',name:'민법'}]},
  {id:'housing2', name:'주택관리사 2차', subs:[{code:'hm2_law',name:'주택관리관계법규'},{code:'hm2_mgmt',name:'공동주택관리실무'}]}
];

const statusEl=document.getElementById('status');
const outEl=document.getElementById('out');
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mnChantLetters(code){ var m=String(code||'').match(/<span class=['"]k['"]>[\s\S]*?<\/span>|<k>[\s\S]*?<\/k>/g); if(!m||m.length<2) return ''; return m.map(function(x){return x.replace(/<[^>]+>/g,'');}).join(''); }
// 앱(index.html)과 동일하게 암기코드 박스 렌더. code/desc는 esc 안 함(=앱처럼 <span class='k'> 두문자가 빨간 볼드로 살아남).
function mnChantHTML(code){ var letters=mnChantLetters(code); return letters?('<div class="mn-chant">'+letters+'</div>'):''; }
function mnBox(code, desc){ if(!code) return ''; return '<div class="mn-box"><div class="mn-ti">암기코드</div>'+mnChantHTML(code)+'<div class="mn-code">'+code+'</div>'+(desc?'<div class="mn-desc">'+desc+'</div>':'')+'</div>'; }
// 중복검사용: 코드 본문에서 태그·공백 제거한 정규화 문자열(본문 동일 판정 기준)
function normCode(code){ return String(code||'').replace(/<[^>]+>/g,'').replace(/\s+/g,'').trim(); }
// 통합 풀 항목(마스터 또는 직접입력) 1개를 클릭 가능한 pill로
function poolItem(e){
  if(e.src==='master') return '<span class="pill">mn://'+esc(e.id)+'</span>';
  var r=e.ref;
  return '<a class="pill" href="'+SITE+'?card='+encodeURIComponent(r.qid)+'&cert='+encodeURIComponent(r.exam)+'" target="_blank" rel="noopener" onclick="return goCard(event,this.href)" style="text-decoration:none" title="'+esc(examName(r.exam)+' / '+subName(r.exam,r.sub))+'">'+esc(r.qid)+' ↗</a>';
}

const MASTER={};   // id -> {name,code,desc,certs,...}
const REFS={};     // id -> [{exam,sub,qid}]
const DIRECT=[];   // {exam,sub,qid,code,desc}
const SUBMN={};    // 'exam||sub' -> [{qid,code,desc,source:'ref'|'direct',refId,broken}]  (앱 표시 순서)

async function loadMaster(){
  const snap=await db.collection('mnemonics').get();
  snap.forEach(d=>{ MASTER[d.id]=d.data()||{}; });
}
async function scanBank(examId, sub){
  const k=examId+'__'+sub.code;
  let snap; try{ snap=await db.collection('banks').doc(k).get(); }catch(e){ return; }
  if(!snap.exists) return;
  const data=snap.data();
  let qs=Array.isArray(data.questions)?data.questions:[];
  if((!qs.length) && Array.isArray(data.shards)){
    for(const sh of data.shards){
      try{ const sd=await db.collection('banks').doc(k+'__'+sh).get(); if(sd.exists && Array.isArray(sd.data().questions)) qs=qs.concat(sd.data().questions); }catch(_){}
    }
  }
  qs.forEach(q=>{
    const mn=q.mn||(q.exp&&q.exp.mn); if(!mn) return;
    const list=Array.isArray(mn)?mn:[mn];
    const key=examId+'||'+sub.code;
    list.forEach(item=>{
      let code='', desc='', source='direct', refId='', broken=false;
      if(typeof item==='string' && item.indexOf('mn://')===0){
        source='ref'; refId=item.slice(5);
        const m=MASTER[refId];
        if(m){ code=m.code||''; desc=m.desc||''; } else { broken=true; }
        (REFS[refId]=REFS[refId]||[]).push({exam:examId, sub:sub.code, qid:q.id});
      } else if(item && typeof item==='object'){
        code=item.code||''; desc=item.desc||'';
        DIRECT.push({exam:examId, sub:sub.code, qid:q.id, code:code, desc:desc});
      } else if(typeof item==='string'){
        code=item;
        DIRECT.push({exam:examId, sub:sub.code, qid:q.id, code:code, desc:''});
      }
      (SUBMN[key]=SUBMN[key]||[]).push({qid:q.id, code:code, desc:desc, source:source, refId:refId, broken:broken});
    });
  });
}
async function scanAll(){
  for(const k in MASTER) delete MASTER[k];
  for(const k in REFS) delete REFS[k];
  for(const k in SUBMN) delete SUBMN[k];
  DIRECT.length=0;
  outEl.innerHTML='';
  try{
    statusEl.textContent='마스터(mnemonics) 불러오는 중…';
    await loadMaster();
    let i=0, tot=REGISTRY.reduce((a,e)=>a+e.subs.length,0);
    for(const ex of REGISTRY){
      for(const su of ex.subs){
        i++; statusEl.textContent='스캔 '+i+'/'+tot+' — '+ex.name+' / '+su.name;
        await scanBank(ex.id, su);
      }
    }
    statusEl.textContent='완료 — 마스터 '+Object.keys(MASTER).length+'개, 참조 '+Object.keys(REFS).length+'종, 직접입력 '+DIRECT.length+'건';
    populateSubSel();
    render();
  }catch(e){ statusEl.textContent='스캔 실패: '+e.message; }
}

function refLabel(r){ return r.exam+' / '+r.sub+' / '+r.qid; }
function goLink(r){ return '<a class="gobtn" href="'+SITE+'?card='+encodeURIComponent(r.qid)+'&cert='+encodeURIComponent(r.exam)+'" target="_blank" rel="noopener" onclick="return goCard(event,this.href)">이 문항 보기 →</a>'; }
function goCard(e,url){ if(e&&(e.ctrlKey||e.metaKey||e.shiftKey||e.button===1)) return true; if(e) e.preventDefault(); window.open(url,'_blank'); return false; }
// 과목 헬퍼
function subKey(exam,sub){ return exam+'||'+sub; }
function examName(exam){ const e=REGISTRY.find(x=>x.id===exam); return e?e.name:exam; }
function subName(exam,subcode){ const e=REGISTRY.find(x=>x.id===exam); const s=e&&e.subs.find(x=>x.code===subcode); return s?s.name:subcode; }
function usedSubs(){
  const set={};
  Object.keys(SUBMN).forEach(k=>set[k]=1);
  const ordered=[];
  REGISTRY.forEach(e=>e.subs.forEach(s=>{ const k=subKey(e.id,s.code); if(set[k]) ordered.push(k); }));
  return ordered;
}
function populateSubSel(){
  const sel=document.getElementById('mnSubSel'); if(!sel) return;
  const subs=usedSubs();
  sel.innerHTML='<option value="">전체 과목</option>'+subs.map(k=>{ const p=k.split('||'); return '<option value="'+esc(k)+'">'+esc(examName(p[0])+' · '+subName(p[0],p[1]))+'</option>'; }).join('');
  sel.style.display=subs.length?'':'none';
}

function render(){
  // 1) 깨진 참조: mn://id 인데 마스터에 id 없음
  const broken=[];
  Object.keys(REFS).forEach(id=>{ if(!MASTER[id]) REFS[id].forEach(r=>broken.push(Object.assign({id:id},r))); });
  // 2) 미사용 코드: 마스터에 있는데 아무 문항도 참조 안 함
  const unused=Object.keys(MASTER).filter(id=>!REFS[id]).sort();
  // 3) 중복 검사용 통합 풀 (마스터 코드 + 직접입력 코드 전체)
  const POOL=[];   // {code, src:'master'|'direct', id?, ref?{exam,sub,qid}}
  Object.keys(MASTER).forEach(id=>{ const c=MASTER[id].code||''; if(c) POOL.push({code:c, src:'master', id:id}); });
  DIRECT.forEach(d=>{ if(d.code) POOL.push({code:d.code, src:'direct', ref:{exam:d.exam,sub:d.sub,qid:d.qid}}); });
  // 3a) 본문 동일: 태그·공백 제거 후 똑같은 코드가 2곳 이상 (이관 강력후보)
  const bySame={};
  POOL.forEach((e,i)=>{ const n=normCode(e.code); if(n){ (bySame[n]=bySame[n]||[]).push(i); } });
  const sameDups=Object.keys(bySame).filter(n=>bySame[n].length>1).map(n=>({items:bySame[n].map(i=>POOL[i])})).sort((a,b)=>b.items.length-a.items.length);
  // 3b) 두문자 중복: 두문자 '모음'이 같은 코드끼리 (본문은 다를 수 있음)
  const byChant={};
  POOL.forEach((e,i)=>{ const c=mnChantLetters(e.code); if(c){ (byChant[c]=byChant[c]||[]).push(i); } });
  const dups=Object.keys(byChant).filter(c=>byChant[c].length>1).map(c=>({chant:c, items:byChant[c].map(i=>POOL[i])})).sort((a,b)=>b.items.length-a.items.length);
  // 4b) keyword 군집: 같은 keyword를 2개 이상 코드가 가짐(개념 같은데 모음 다른 중복 보조 탐지)
  const byKw={};
  Object.keys(MASTER).forEach(id=>{ (MASTER[id].keywords||[]).forEach(kw=>{ kw=String(kw||'').trim(); if(kw){ (byKw[kw]=byKw[kw]||[]).push(id); } }); });
  const kwClusters=Object.keys(byKw).filter(kw=>byKw[kw].length>1).map(kw=>({kw, ids:byKw[kw]})).sort((a,b)=>b.ids.length-a.ids.length);
  // 4) 직접입력 mn (이관 후보)
  const direct=DIRECT.slice();

  let h='';

  // 0) 과목별 암기코드 — 앱(index.html)에 표시되는 모습 그대로
  const subFilter=(document.getElementById('mnSubSel')||{}).value||'';
  const subKeys=usedSubs().filter(k=>!subFilter||k===subFilter);
  h+='<div class="sec"><h2>📚 과목별 암기코드 <span class="cnt '+(subKeys.length?'ok':'warn')+'">'+subKeys.length+'과목</span></h2>'
    +'<div class="desc">각 과목 문항의 암기코드를 <b>앱에 뜨는 모습 그대로</b> 렌더합니다(두문자 강조 포함). 항목 아래 <b>문항 번호 · 출처</b>(mn:// 참조 / 직접입력)와 "이 문항 보기"로 바로 수정하러 갈 수 있습니다. 위 드롭다운으로 과목을 골라 볼 수 있어요.</div>';
  if(!subKeys.length) h+='<div class="empty">표시할 과목이 없습니다. "전체 스캔"을 먼저 누르세요.</div>';
  else h+=subKeys.map(k=>{
    const p=k.split('||'), ex=p[0], su=p[1];
    const list=SUBMN[k]||[];
    const refN=list.filter(x=>x.source==='ref').length, dirN=list.filter(x=>x.source==='direct').length, brokenN=list.filter(x=>x.broken).length;
    let inner='<div class="shd">'+esc(subName(ex,su))+' <span class="smeta">'+esc(examName(ex))+' · 총 '+list.length+'개 (참조 '+refN+' · 직접 '+dirN+')'+(brokenN?(' · ⚠️ 깨짐 '+brokenN):'')+'</span></div>';
    if(!list.length) inner+='<div class="empty" style="padding:2px">암기코드 없음</div>';
    else inner+=list.map(e=>{
      const box = e.broken
        ? '<div class="mn-box"><div class="mn-ti">암기코드</div><div class="mn-code" style="color:#A32D2D">⚠️ 참조 오류: mn://'+esc(e.refId)+' (마스터에 없음 → 앱에서 빈칸)</div></div>'
        : (mnBox(e.code, e.desc) || '<div class="mn-box"><div class="mn-ti">암기코드</div><div class="mn-code" style="color:#94A3B8">(코드 비어있음)</div></div>');
      const src = e.source==='ref' ? ('mn://'+esc(e.refId)) : '직접입력';
      return '<div class="mnentry">'+box+'<div class="enmeta"><span class="src">'+esc(e.qid)+'</span><span class="src">'+src+'</span>'+goLink({exam:ex,sub:su,qid:e.qid})+'</div></div>';
    }).join('');
    return '<div class="subgrp">'+inner+'</div>';
  }).join('');
  h+='</div>';

  // 깨진 참조
  h+='<div class="sec"><h2>🔗 깨진 참조 <span class="cnt '+(broken.length?'err':'ok')+'">'+broken.length+'</span></h2>'
    +'<div class="desc">문항이 <b>mn://id</b>로 참조하는데 마스터에 그 id가 없음 → 앱에서 암기코드 칸이 빈 채로 렌더됩니다.</div>';
  if(!broken.length) h+='<div class="empty">없음 ✅</div>';
  else h+=broken.map(b=>'<div class="row"><span class="k">mn://'+esc(b.id)+'</span> — 마스터에 없음<div class="meta">'+esc(refLabel(b))+'</div>'+goLink(b)+'</div>').join('');
  h+='</div>';

  // 미사용 코드
  h+='<div class="sec"><h2>🗂 미사용 코드 <span class="cnt '+(unused.length?'warn':'ok')+'">'+unused.length+'</span></h2>'
    +'<div class="desc">마스터에 등록됐지만 아무 문항도 <b>mn://</b>로 참조하지 않는 코드. (예정 사용이면 그대로 두고, 불필요하면 삭제 검토)</div>';
  if(!unused.length) h+='<div class="empty">없음 ✅</div>';
  else h+=unused.map(id=>{ const m=MASTER[id]; const c=mnChantLetters(m.code);
    return '<div class="row"><span class="k">'+esc(id)+'</span> '+esc(m.name||'')+(c?' <span class="chant">'+esc(c)+'</span>':'')+'</div>'; }).join('');
  h+='</div>';

  // 본문 동일 암기코드 (이관 강력후보) — 마스터+직접입력 전체
  h+='<div class="sec"><h2>📋 본문 동일 암기코드 <span class="cnt '+(sameDups.length?'warn':'ok')+'">'+sameDups.length+'</span></h2>'
    +'<div class="desc">태그·공백 빼고 <b>본문이 똑같은</b> 암기코드가 2곳 이상 — 마스터·직접입력을 모두 비교합니다. 진짜 중복이라 <b>마스터 1개로 합치고 mn:// 참조로 바꾸기</b> 강력 후보.</div>';
  if(!sameDups.length) h+='<div class="empty">없음 ✅</div>';
  else h+=sameDups.map(g=>'<div class="row">'+mnBox(g.items[0].code,'')+'<div class="meta"><b>'+g.items.length+'곳</b> · '+g.items.map(poolItem).join(' ')+'</div></div>').join('');
  h+='</div>';

  // 중복 두문자 (마스터+직접입력 전체)
  h+='<div class="sec"><h2>👯 중복 두문자 <span class="cnt '+(dups.length?'warn':'ok')+'">'+dups.length+'</span></h2>'
    +'<div class="desc">두문자 \'모음\'이 같은 코드들(마스터+직접입력 전체 비교). 본문이 같으면 위 \'본문 동일\'과 겹치고, 본문이 다르면 같은 개념을 다르게 외운 중복 후보일 수 있어 검토.</div>';
  if(!dups.length) h+='<div class="empty">없음 ✅</div>';
  else h+=dups.map(d=>'<div class="row"><span class="chant">'+esc(d.chant)+'</span> <span class="x">'+d.items.length+'개</span><div class="meta">'+d.items.map(poolItem).join(' ')+'</div></div>').join('');
  h+='</div>';

  // keyword 군집 (중복 보조)
  h+='<div class="sec"><h2>🧩 keyword 군집 <span class="cnt '+(kwClusters.length?'warn':'ok')+'">'+kwClusters.length+'</span></h2>'
    +'<div class="desc">같은 <b>keyword</b>를 단 코드가 2개 이상 — 두문자 \'모음\'이 달라도 개념이 겹칠 수 있는 중복 후보(모음 중복이 놓치는 경우 보조).</div>';
  if(!kwClusters.length) h+='<div class="empty">없음 ✅</div>';
  else h+=kwClusters.map(c=>'<div class="row"><b>'+esc(c.kw)+'</b><div class="meta">'+c.ids.map(id=>'<span class="pill">'+esc(id)+'</span>').join('')+'</div></div>').join('');
  h+='</div>';

  // 직접입력 (이관 후보)
  h+='<div class="sec"><h2>📥 직접입력 mn (이관 후보) <span class="cnt '+(direct.length?'warn':'ok')+'">'+direct.length+'</span></h2>'
    +'<div class="desc">문항에 직접 입력된 암기코드(참조 아님). 재사용·과목겹침 개념이면 마스터로 옮기고 <b>mn://id</b> 참조로 바꾸는 게 좋습니다. (일회성이면 그대로 OK)</div>';
  if(!direct.length) h+='<div class="empty">없음 ✅</div>';
  else h+=direct.map(d=>{
    return '<div class="mnentry">'+mnBox(d.code, d.desc)+'<div class="enmeta"><span class="src">'+esc(refLabel(d))+'</span>'+goLink(d)+'</div></div>'; }).join('');
  h+='</div>';

  outEl.innerHTML=h;
}
</script>
</body>
</html>
