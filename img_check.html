<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>이미지 업로드 확인 — CertLab</title>
<style>
:root{--blue:#0C447C;--ink:#2A2620;--sub:#6E6256;--ok:#15803D;--bad:#C0392B}
*{box-sizing:border-box}
body{margin:0;background:#F1F5F9;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);padding:18px}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:19px;color:var(--blue);margin:0 0 4px}
.sub{font-size:13px;color:var(--sub);margin:0 0 16px}
.note{font-size:12px;color:var(--sub);background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:11px 14px;margin-bottom:14px;line-height:1.7}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.fcol{display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1}
.fcol label{font-size:11.5px;font-weight:700;color:var(--sub)}
select{font-size:14px;padding:9px 11px;border:1px solid #CBD5E1;border-radius:9px;background:#fff;color:var(--ink);width:100%}
.bar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
.summary{font-size:12.5px;color:#475569}
.summary b{color:var(--ink)}
.sort{font-size:12px;color:var(--sub)}
.grouphd{font-size:12.5px;font-weight:800;color:var(--blue);margin:16px 2px 8px;padding-bottom:5px;border-bottom:1px solid #E2E8F0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.thumb{background:#F8FAFC;min-height:210px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #EEF2F7;padding:8px}
.thumb img{max-width:100%;height:auto;display:block}
.thumb .ph{font-size:12px;color:#B4A99C;padding:30px 10px;text-align:center}
.thumb .ph.bad{color:var(--bad);font-weight:600}
.meta{padding:10px 12px}
.meta .qid{font-size:14px;font-weight:800}
.meta .kind{font-size:10.5px;font-weight:700;color:#185FA5;background:#E6F1FB;border-radius:5px;padding:1px 6px;margin-left:5px}
.meta .imgid{font-size:11.5px;color:var(--sub);margin-top:3px;word-break:break-all}
.meta .st{font-size:11.5px;font-weight:700;margin-top:6px}
.st.ok{color:var(--ok)}.st.bad{color:var(--bad)}.st.load{color:#9AA3AE}
.gobtn{display:block;text-align:center;margin:6px 12px 12px;padding:8px;border-radius:9px;background:#185FA5;color:#fff;text-decoration:none;font-size:12.5px;font-weight:700}
.empty{font-size:13px;color:var(--sub);text-align:center;padding:40px 10px}
</style></head>
<body><div class="wrap">
<h1>🖼️ 이미지 업로드 확인</h1>
<p class="sub">시험·과목을 골라 이미지 매칭을 확인하고, 문항을 앱에서 바로 열 수 있어요.</p>
<div class="note">✅ 그림이 보이면 업로드 성공 · ❌ "이미지 없음"이면 admin 이미지 탭에서 그 id로 다시 등록(파일명과 정확히 일치).<br>"이 문항 보기"는 <b>certlab.ai.kr/?card=문항id</b>로 앱을 엽니다.</div>

<div class="filters">
  <div class="fcol"><label>시험</label><select id="examSel"><option value="">불러오는 중…</option></select></div>
  <div class="fcol"><label>과목</label><select id="subSel"><option value="">전체 과목</option></select></div>
  <div class="fcol"><label>회차</label><select id="setSel"><option value="">전체 회차</option></select></div>
</div>
<div class="bar">
  <div class="summary" id="summary">스캔 중…</div>
  <div class="sort" id="sortBtn" onclick="cycleSort()" style="cursor:pointer;user-select:none" title="정렬 전환">↓ 최신순</div>
</div>
<div id="grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab-c3bcb.firebaseapp.com",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.firebasestorage.app",
  messagingSenderId: "698827699707",
  appId: "1:698827699707:web:b08d492f408ac444fa875e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const SITE = 'https://certlab.ai.kr/';

const examSel=document.getElementById('examSel');
const subSel=document.getElementById('subSel');
const grid=document.getElementById('grid');
const summaryEl=document.getElementById('summary');

const imgCache={};
async function fetchImg(id){
  if(imgCache[id]!==undefined) return imgCache[id];
  try{ const d=await db.collection('images').doc(id).get(); const b=(d.exists && d.data().data)?d.data().data:null; imgCache[id]=b; return b; }
  catch(e){ imgCache[id]=null; return null; }
}
function normKey(v){ if(!v) return null; v=String(v).trim(); return v.indexOf('img://')===0?v.slice(6):v; }
function maxNum(s){ const m=String(s||'').match(/\d+/g); return m?Math.max.apply(null,m.map(Number)):-1; }

let ITEMS=[];   // {exam,examName,sub,subName,qid,setLabel,n,key,kind}
let EXAMS=[];   // {id,name,subs:[{code,name}]}
let renderToken=0;

async function initSelects(){
  let manifest;
  try{
    const mSnap=await db.collection('manifest').doc('exams').get();
    if(!mSnap.exists){ summaryEl.textContent='manifest/exams 문서가 없어요.'; return; }
    manifest=mSnap.data();
  }catch(e){ summaryEl.textContent='데이터를 불러오지 못했어요.'; return; }
  // manifest만으로 시험·과목 셀렉트 구성 (banks fetch 안 함)
  EXAMS=(manifest.exams||[]).map(ex=>({ id:ex.id, name:ex.name||ex.id,
    subs:(ex.subjects||[]).map(su=>({code:su.code, name:su.name||su.code})) })).filter(e=>e.subs.length);
  buildExamSel();
  buildSubSel();
  summaryEl.textContent='시험과 과목을 선택하면 그 과목만 불러옵니다.';
}

// 선택한 과목의 bank만 fetch해 ITEMS에 적재 (한 번 받으면 캐시)
const loadedSet={};
async function loadBank(examId, sub){
  const k=examId+'__'+sub.code;
  if(loadedSet[k]) return;
  loadedSet[k]=true;
  let snap;
  try{ snap=await db.collection('banks').doc(k).get(); }catch(e){ loadedSet[k]=false; return; }
  if(!snap.exists) return;
  const qs=(snap.data().questions)||[];
  const ex=EXAMS.find(e=>e.id===examId);
  qs.forEach(q=>{
    const setLabel=q.set||''; const n=maxNum(setLabel);
    const base={exam:examId, examName:(ex?ex.name:examId), sub:sub.code, subName:sub.name, qid:q.id, setLabel:setLabel, n:n};
    const ik=normKey(q.img);
    if(ik){ ITEMS.push(Object.assign({},base,{key:ik,kind:'본문'})); }
    if(Array.isArray(q.optImg)){
      q.optImg.forEach((o,i)=>{ const ok=normKey(o); if(ok){ ITEMS.push(Object.assign({},base,{key:ok,kind:'선지'+(i+1)})); } });
    }
  });
}
// 현재 선택 범위(시험+과목)에 필요한 bank만 로드. 시험 미선택=로드 안 함, 과목 미선택=그 시험 전 과목.
async function ensureScope(){
  const ex=EXAMS.find(e=>e.id===examSel.value);
  if(!ex) return;
  const subs = subSel.value ? ex.subs.filter(s=>s.code===subSel.value) : ex.subs;
  const need = subs.filter(s=>!loadedSet[ex.id+'__'+s.code]);
  if(need.length){ grid.innerHTML='<div class="empty">불러오는 중…</div>'; summaryEl.textContent='불러오는 중…'; }
  for(const s of subs){ await loadBank(ex.id, s); }
}

function buildExamSel(){
  if(!EXAMS.length){ examSel.innerHTML='<option value="">(시험 없음)</option>'; summaryEl.textContent='manifest에 시험이 없어요.'; return; }
  examSel.innerHTML='<option value="">시험 선택…</option>'+EXAMS.map(e=>'<option value="'+e.id+'">'+e.name+'</option>').join('');
}
function buildSubSel(){
  const ex=EXAMS.find(e=>e.id===examSel.value);
  let opts='<option value="">전체 과목</option>';
  if(ex) opts+=ex.subs.map(s=>'<option value="'+s.code+'">'+s.name+'</option>').join('');
  subSel.innerHTML=opts;
}
function buildSetSel(){
  const exF=examSel.value, subF=subSel.value, cur=setSel.value;
  const setMap={};
  ITEMS.filter(it=>(!exF||it.exam===exF)&&(!subF||it.sub===subF)).forEach(it=>{ if(it.setLabel) setMap[it.setLabel]=it.n; });
  const labels=Object.keys(setMap).sort((a,b)=>setMap[b]-setMap[a]);
  setSel.innerHTML='<option value="">전체 회차</option>'+labels.map(l=>'<option value="'+l+'">'+l+'</option>').join('');
  if(labels.indexOf(cur)>=0) setSel.value=cur;
}
const setSel=document.getElementById('setSel');
examSel.onchange=async function(){ buildSubSel(); await ensureScope(); buildSetSel(); render(); };
subSel.onchange=async function(){ await ensureScope(); buildSetSel(); render(); };
setSel.onchange=function(){ render(); };

let sortMode=0; const SORT_LABELS=['↓ 최신순','↓ 이름순','↓ 과목순'];
function cycleSort(){ sortMode=(sortMode+1)%3; const b=document.getElementById('sortBtn'); if(b) b.textContent=SORT_LABELS[sortMode]; render(); }
function render(){
  const token=++renderToken;
  const exF=examSel.value, subF=subSel.value, setF=setSel.value;
  let items=ITEMS.filter(it=>(!exF||it.exam===exF)&&(!subF||it.sub===subF)&&(!setF||it.setLabel===setF));
  if(!items.length){
    if(!examSel.value){ grid.innerHTML='<div class="empty">시험을 선택하세요. (선택한 과목만 불러옵니다)</div>'; summaryEl.textContent=''; return; }
    grid.innerHTML='<div class="empty">이 과목엔 이미지 문항이 없어요.</div>'; summaryEl.textContent='전체 0'; return;
  }

  // 카드 1장 HTML (공통)
  function cardHTML(it, cid){
    it._cid=cid;
    return '<div class="card">'
      +'<div class="thumb" id="th_'+cid+'"><div class="ph">불러오는 중…</div></div>'
      +'<div class="meta"><div class="qid">'+it.qid+'<span class="kind">'+it.kind+'</span></div>'
      +'<div class="imgid">'+it.key+'</div>'
      +'<div class="st load" id="st_'+cid+'">확인 중…</div></div>'
      +'<a class="gobtn" href="'+SITE+'?card='+encodeURIComponent(it.qid)+'" target="_blank">이 문항 보기 →</a>'
      +'</div>';
  }

  let html='';
  if(sortMode===1){
    // 이름순: 전체 평면, 키(key) 가나다/알파벳/숫자순
    const rows=items.slice().sort((a,b)=>String(a.key).localeCompare(String(b.key),undefined,{numeric:true,sensitivity:'base'}));
    html+='<div class="grouphd">전체 · 이름순 ('+rows.length+')</div><div class="grid">';
    rows.forEach((it,idx)=>{ html+=cardHTML(it,'nm_'+idx); });
    html+='</div>';
  } else {
    // 최신순=시험·과목·회차 그룹 / 과목순=시험·과목 그룹
    const byset=(sortMode===0);
    const groups={}, order=[];
    items.forEach(it=>{
      const gk=byset ? (it.exam+'||'+it.sub+'||'+it.setLabel) : (it.exam+'||'+it.sub);
      if(!groups[gk]){ groups[gk]={key:gk,it:it,n:it.n,rows:[]}; order.push(gk); }
      groups[gk].rows.push(it);
      if(it.n>groups[gk].n) groups[gk].n=it.n;
    });
    order.sort((a,b)=>{
      const ga=groups[a],gb=groups[b];
      const ia=EXAMS.findIndex(e=>e.id===ga.it.exam), ib=EXAMS.findIndex(e=>e.id===gb.it.exam);
      if(ia!==ib) return ia-ib;                                 // 시험은 manifest 순서
      if(sortMode===0 && gb.n!==ga.n) return gb.n-ga.n;         // 최신순: 회차 큰 것 먼저
      return ga.it.subName.localeCompare(gb.it.subName,'ko');   // 과목명순
    });
    order.forEach(gk=>{
      const g=groups[gk];
      g.rows.sort((a,b)=> sortMode===0
        ? String(a.qid).localeCompare(String(b.qid),undefined,{numeric:true})
        : String(a.key).localeCompare(String(b.key),undefined,{numeric:true,sensitivity:'base'}));
      let hd=(exF?'':g.it.examName+' · ')+g.it.subName+((sortMode===0&&g.it.setLabel)?' · '+g.it.setLabel:'');
      html+='<div class="grouphd">'+hd+'</div><div class="grid">';
      g.rows.forEach((it,idx)=>{ html+=cardHTML(it, gk.replace(/[^a-zA-Z0-9]/g,'_')+'_'+idx); });
      html+='</div>';
    });
  }
  grid.innerHTML=html;

  // 비동기 이미지 조회 + 요약 갱신
  let ok=0,bad=0,done=0; const total=items.length;
  summaryEl.innerHTML='전체 <b>'+total+'</b> · 확인 중…';
  (async()=>{
    for(const it of items){
      if(token!==renderToken) return;
      const th=document.getElementById('th_'+it._cid);
      const st=document.getElementById('st_'+it._cid);
      if(!th||!st) continue;
      const b64=await fetchImg(it.key);
      if(token!==renderToken) return;
      if(b64){ th.innerHTML='<img src="'+b64+'" alt="'+it.key+'">'; st.className='st ok'; st.textContent='✅ 업로드됨'; ok++; }
      else{ th.innerHTML='<div class="ph bad">❌ 이미지 없음</div>'; st.className='st bad'; st.textContent='❌ 미등록'; bad++; }
      done++;
      summaryEl.innerHTML='전체 <b>'+total+'</b> · <span style="color:var(--ok)">✅ '+ok+'</span> · <span style="color:var(--bad)">❌ '+bad+'</span>'+(done<total?' · 확인 중…':'');
    }
  })();
}

initSelects();
</script>
</body></html>
