<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>생체 이미지 확인 — CertLab</title>
<style>
:root{--blue:#0C447C;--ink:#2A2620;--sub:#6E6256;--ok:#15803D;--bad:#C0392B}
*{box-sizing:border-box}
body{margin:0;background:#F1F5F9;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);padding:18px}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:19px;color:var(--blue);margin:0 0 4px}
.sub{font-size:13px;color:var(--sub);margin:0 0 18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.thumb{background:#F8FAFC;min-height:150px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #EEF2F7}
.thumb img{max-width:100%;height:auto;display:block}
.thumb .ph{font-size:12px;color:#B4A99C;padding:30px 10px;text-align:center}
.meta{padding:11px 13px}
.meta .qid{font-size:14px;font-weight:800;color:var(--ink)}
.meta .imgid{font-size:11.5px;color:var(--sub);margin-top:2px;word-break:break-all}
.meta .st{font-size:11.5px;font-weight:700;margin-top:6px}
.st.ok{color:var(--ok)}.st.bad{color:var(--bad)}.st.load{color:#9AA3AE}
.gobtn{display:block;text-align:center;margin:8px 13px 13px;padding:9px;border-radius:9px;background:linear-gradient(135deg,#185FA5,#0C447C);color:#fff;text-decoration:none;font-size:13px;font-weight:700}
.note{font-size:12px;color:var(--sub);background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:12px 14px;margin-bottom:16px;line-height:1.7}
</style></head>
<body><div class="wrap">
<h1>🖼️ 생체 이미지 업로드 확인</h1>
<p class="sub">올린 이미지가 잘 매칭되는지 확인하고, 버튼으로 해당 문항을 앱에서 바로 열 수 있어요.</p>
<div class="note">✅ 그림이 보이면 업로드 성공 · ❌ "이미지 없음"이면 admin 이미지 탭에서 그 id로 다시 등록 (파일명과 정확히 일치).<br>"이 문항 보기"는 <b>certlab.ai.kr/?card=문항id</b>로 앱을 엽니다.</div>
<div class="grid" id="grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab-c3bcb.firebaseapp.com",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.firebasestorage.app",
  messagingSenderId: "698827699707",
  appId: "1:698827699707:web:b08d492f408ac444fa875e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const SITE = 'https://certlab.ai.kr/';

// 문항 ↔ 이미지 매핑 (지시서 기준)
const ITEMS = [
  { qid:'EP_42', img:'sarcomere' },
  { qid:'EP_50', img:'crossbridge_cycle' },
  { qid:'EP_51', img:'anatomy_planes' },
  { qid:'EP_56', img:'knee_ligaments' },
  { qid:'EP_61', img:'lever_classes' },
  { qid:'EP_83', img:'lever_classes' },
  { qid:'EP_72', img:'heart_conduction' },
  { qid:'EP_79', img:'rotator_cuff' },
  { qid:'B_8',  img:'pose_bb_men7' },
  { qid:'B_57', img:'pose_classic_physique' },
  { qid:'B_64', img:'pose_bikini_turns' },
  { qid:'B_69', img:'pose_mens_physique' },
];

const grid = document.getElementById('grid');
ITEMS.forEach(it=>{
  const card=document.createElement('div'); card.className='card';
  card.innerHTML =
    '<div class="thumb" id="th_'+it.qid+'"><div class="ph">불러오는 중…</div></div>'+
    '<div class="meta"><div class="qid">'+it.qid+'</div><div class="imgid">'+it.img+'</div>'+
    '<div class="st load" id="st_'+it.qid+'">확인 중…</div></div>'+
    '<a class="gobtn" href="'+SITE+'?card='+encodeURIComponent(it.qid)+'" target="_blank">이 문항 보기 →</a>';
  grid.appendChild(card);
});

// 이미지 캐시(같은 id 공유 시 1번만 조회)
const cache={};
async function fetchImg(id){
  if(cache[id]!==undefined) return cache[id];
  try{ const d=await db.collection('images').doc(id).get(); const b=(d.exists && d.data().data)?d.data().data:null; cache[id]=b; return b; }
  catch(e){ cache[id]=null; return null; }
}
(async()=>{
  for(const it of ITEMS){
    const th=document.getElementById('th_'+it.qid);
    const st=document.getElementById('st_'+it.qid);
    const b64=await fetchImg(it.img);
    if(b64){
      th.innerHTML='<img src="'+b64+'" alt="'+it.img+'">';
      st.className='st ok'; st.textContent='✅ 업로드됨';
    } else {
      th.innerHTML='<div class="ph">❌ 이미지 없음</div>';
      st.className='st bad'; st.textContent='❌ 미등록 ('+it.img+')';
    }
  }
})();
</script>
</body></html>
