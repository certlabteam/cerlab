<style>
:root{--blue:#0C447C;--blue2:#185FA5;--ink:#2A2620;--sub:#6E6256}
*{box-sizing:border-box}
body{margin:0;background:#FDF6EE;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);line-height:1.7}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 50px}
.topbar{position:sticky;top:0;background:rgba(253,246,238,.92);backdrop-filter:blur(6px);display:flex;align-items:center;padding:12px 4px;z-index:10}
.topbar .back{color:var(--blue);font-size:15px;font-weight:700;text-decoration:none}
.hero{text-align:center;padding:22px 18px;background:linear-gradient(135deg,#FFF4E0,#FFE4C2);border:2px solid #F2B23C;border-radius:20px;margin-top:6px;box-shadow:0 6px 22px rgba(242,178,60,.25)}

.ev{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #EEE3D5;border-radius:16px;padding:15px 16px;margin-bottom:11px;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .12s,box-shadow .12s}

.ev .ic{flex-shrink:0;width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#FFF4E0,#FFE4C2);display:flex;align-items:center;justify-content:center;font-size:24px}
.ev .nm{font-size:15.5px;font-weight:800}
.ev .ds{font-size:12.5px;color:var(--sub);margin-top:2px}
.ev .go{margin-left:auto;color:var(--blue);font-weight:800;font-size:20px}
.tag{display:inline-block;background:#E2554B;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
footer{text-align:center;font-size:12px;color:#B4A99C;margin-top:30px}

<body><div class="wrap">
