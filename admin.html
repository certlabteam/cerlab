<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CertLab кҙҖлҰ¬мһҗ</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F4F6FA;color:#2C2C2A;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
:root{--pink:#D4537E;--purple:#7F77DD;--green:#1D9E75;--red:#E24B4A;--blue:#185FA5;--gray:#888780}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF5F8,#F0EDFF)}
.login-box{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
.login-logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,#D4537E,#7F77DD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.login-sub{font-size:14px;color:#888780;margin-bottom:32px}
.btn-google{width:100%;padding:14px;border-radius:12px;border:1.5px solid #E0E0E0;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:600;color:#2C2C2A;cursor:pointer;transition:all .15s}
.btn-google:hover{background:#F5F5F5}
.google-icon{width:20px;height:20px}
.login-note{font-size:12px;color:#B4B2A9;margin-top:16px}
.admin-wrap{display:none;min-height:100vh;flex-direction:column}
.admin-header{background:#fff;border-bottom:1px solid #E8E8E8;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.admin-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#D4537E,#7F77DD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-user{display:flex;align-items:center;gap:10px;font-size:13px;color:#888780}
.btn-logout{padding:6px 14px;border-radius:20px;border:1.5px solid #E8E8E8;background:#fff;font-size:12px;color:#888780;cursor:pointer}
.btn-logout:hover{background:#F5F5F5}
.admin-content{padding:24px;max-width:1200px;margin:0 auto;width:100%}
.test-msg{background:#E6F1FB;border:1px solid #185FA5;color:#185FA5;padding:12px;border-radius:8px;text-align:center;margin:20px}
</style>
</head>
<body>

<!-- лЎңк·ёмқё нҷ”л©ҙ -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">CertLab</div>
    <div class="login-sub">кҙҖлҰ¬мһҗ м „мҡ© нҺҳмқҙм§Җ</div>
    <button class="btn-google" onclick="adminLogin()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      GoogleлЎң лЎңк·ёмқё
    </button>
    <div class="login-note">кҙҖлҰ¬мһҗ кі„м •мңјлЎңл§Ң м ‘к·ј к°ҖлҠҘн•©лӢҲлӢӨ</div>
  </div>
</div>

<!-- кҙҖлҰ¬мһҗ л©”мқё -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-logo">CertLab кҙҖлҰ¬мһҗ</div>
    <div class="admin-user">
      <span id="adminEmail">-</span>
      <button class="btn-logout" onclick="adminLogout()">лЎңк·ём•„мӣғ</button>
    </div>
  </div>

  <div class="admin-content">
    <div class="test-msg">
      вң… Google лЎңк·ёмқё н…ҢмҠӨнҠё м„ұкіө!<br>
      <b id="testEmail">лЎңк·ёмқё кі„м •: -</b>
    </div>
  </div>
</div>

<script>
// ===== Firebase мҙҲкё°нҷ” =====
const firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab-c3bcb.firebaseapp.com",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.firebasestorage.app",
  messagingSenderId: "698827699707",
  appId: "1:698827699707:web:b08d492f408ac444fa875e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ===== Google лЎңк·ёмқё =====
async function adminLogin() {
  try {
    await auth.signInWithPopup(googleProvider);
  } catch(e) {
    if(e.code !== 'auth/popup-closed-by-user') {
      alert('лЎңк·ёмқё мҳӨлҘҳ: ' + e.message);
    }
  }
}

function adminLogout() {
  if(confirm('лЎңк·ём•„мӣғ н•ҳмӢңкІ м–ҙмҡ”?')) {
    auth.signOut();
  }
}

// ===== мқёмҰқ мғҒнғң к°җмӢң =====
auth.onAuthStateChanged(user => {
  if(user) {
    // лЎңк·ёмқёлҗЁ
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'flex';
    document.getElementById('adminEmail').textContent = user.email;
    document.getElementById('testEmail').textContent = 'лЎңк·ёмқё кі„м •: ' + user.email;
    console.log('вң… лЎңк·ёмқё м„ұкіө:', user.email);
  } else {
    // лЎңк·ём•„мӣғлҗЁ
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminWrap').style.display = 'none';
    console.log('лЎңк·ём•„мӣғ мғҒнғң');
  }
});

</script>
</body>
</html>
