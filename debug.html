<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CertLab 모바일 진단</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:16px;background:#0C447C;color:#fff;line-height:1.6}
  h1{font-size:18px;margin:0 0 12px}
  .log{background:#fff;color:#1F2937;border-radius:12px;padding:14px;font-size:14px;white-space:pre-wrap;word-break:break-word;min-height:200px}
  .ok{color:#15803D;font-weight:700}
  .err{color:#C0392B;font-weight:700}
  .step{color:#6B7280;font-size:12px}
  button{margin-top:12px;width:100%;background:#fff;color:#0C447C;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800}
</style>
</head>
<body>
<h1>CertLab 모바일 진단</h1>
<div class="log" id="log">시작하는 중…</div>
<button onclick="location.reload()">다시 검사</button>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script>
var logEl=document.getElementById('log');
var lines=[];
function add(msg, cls){ lines.push(cls?('<span class="'+cls+'">'+msg+'</span>'):msg); logEl.innerHTML=lines.join('\n'); }

add('1) 브라우저: '+navigator.userAgent, 'step');

var firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab.ai.kr",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.firebasestorage.app",
  messagingSenderId: "698827699707",
  appId: "1:698827699707:web:b08d492f408ac444fa875e"
};

(async function(){
  try{
    firebase.initializeApp(firebaseConfig);
    add('2) Firebase 초기화 OK', 'ok');
  }catch(e){ add('2) Firebase 초기화 실패: '+e.message, 'err'); return; }

  var appCheckOK=false;
  try{
    firebase.appCheck().activate(new firebase.appCheck.ReCaptchaV3Provider('6LeSfSQtAAAAAAycXeNoC1nMdIjMAdkh61qT_Dh2'), true);
    add('3) App Check 활성화 OK', 'ok');
  }catch(e){ add('3) App Check 활성화 실패: '+e.message, 'err'); }

  var t0=Date.now();
  try{
    var tok=await firebase.appCheck().getToken();
    add('4) App Check 토큰 발급 OK ('+((Date.now()-t0)/1000).toFixed(1)+'초)', 'ok');
    appCheckOK=true;
  }catch(e){ add('4) App Check 토큰 발급 실패 ('+((Date.now()-t0)/1000).toFixed(1)+'초): '+(e.code||'')+' '+e.message, 'err'); }

  var db=firebase.firestore();
  try{ db.settings({ experimentalAutoDetectLongPolling: true, merge: true }); }catch(e){}

  var t1=Date.now();
  try{
    var snap=await db.collection('examSchedules').get();
    add('5) examSchedules 읽기 OK — '+snap.size+'개 ('+((Date.now()-t1)/1000).toFixed(1)+'초)', 'ok');
    snap.forEach(function(d){ var x=d.data()||{}; add('   · '+d.id+' = '+(x.nextExamName||'')+' / '+(x.nextExamDate&&x.nextExamDate.toDate?x.nextExamDate.toDate().toISOString().slice(0,10):'-'), 'step'); });
  }catch(e){ add('5) examSchedules 읽기 실패: '+(e.code||'')+' '+e.message, 'err'); }

  var t2=Date.now();
  try{
    var ms=await db.collection('manifest').doc('exams').get();
    add('6) manifest 읽기 OK ('+((Date.now()-t2)/1000).toFixed(1)+'초)', 'ok');
  }catch(e){ add('6) manifest 읽기 실패: '+(e.code||'')+' '+e.message, 'err'); }

  add('--- 검사 끝 ---', 'step');
})();
</script>
</body>
</html>
