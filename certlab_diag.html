<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CertLab 진단툴 (읽기 전용)</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#232c38; --line:#2f3a48;
    --text:#e6edf3; --muted:#8b98a8; --accent:#4aa8ff; --ok:#3fb950; --warn:#d29922; --err:#f85149;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.5;font-size:15px}
  header{padding:18px 16px;background:linear-gradient(180deg,#1c2530,#161d26);border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:18px}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  main{max-width:980px;margin:0 auto;padding:16px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  button{background:var(--accent);color:#04121f;border:0;border-radius:8px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer}
  button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .status{font-size:13px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
  .card h2{margin:0 0 10px;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:700}
  .pill.ok{background:rgba(63,185,80,.15);color:var(--ok)}
  .pill.warn{background:rgba(210,153,34,.15);color:var(--warn)}
  .pill.err{background:rgba(248,81,73,.15);color:var(--err)}
  .pill.muted{background:var(--panel2);color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
  details{margin-top:8px}
  summary{cursor:pointer;color:var(--accent);font-size:13px}
  .kv{display:grid;grid-template-columns:160px 1fr;gap:4px 12px;font-size:13px}
  .kv .k{color:var(--muted)}
  pre{background:#0b0f14;border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;font-size:12px;max-height:300px}
  .note{font-size:12px;color:var(--muted);margin-top:6px}
  .legend{font-size:12px;color:var(--muted);margin:6px 0 0}
  input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;min-width:200px}
</style>
</head>
<body>
<header>
  <h1>CertLab 진단툴 <span class="pill muted">읽기 전용</span></h1>
  <p>Firestore의 manifest와 문제은행(banks) 상태를 점검합니다. 데이터를 절대 수정하지 않습니다.</p>
</header>
<main>
  <div class="card">
    <div class="row">
      <button id="btnRun">전체 진단 실행</button>
      <button id="btnLogin" class="secondary">관리자 로그인(선택)</button>
      <span class="status" id="status">준비됨. 로그인 없이도 공개 읽기 규칙이면 조회됩니다.</span>
    </div>
    <div class="row">
      <input type="text" id="prefix" value="appraiser" />
      <button id="btnCheckCert" class="secondary">이 자격증 과목만 점검</button>
      <span class="note">예: appraiser, bodybuilding</span>
    </div>
    <p class="legend">정상 / 주의(확인 권장) / 오류. 전항정답·복수정답(ans가 배열)도 함께 표시합니다.</p>
  </div>

  <div id="out"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSQlow8xzRsv0EMtIYJ6_WDRAFUECrw2Q",
  authDomain: "certlab-c3bcb.firebaseapp.com",
  projectId: "certlab-c3bcb",
  storageBucket: "certlab-c3bcb.appspot.com"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const $ = (id)=>document.getElementById(id);
const out = $("out");
const setStatus = (t)=>{ $("status").textContent = t; };

const EXPECT = {
  appraiser: { perSet: 40, sets: 6, total: 240, subjects: ["civil","econ","real","law","acct"] }
};

function pill(kind, txt){ return '<span class="pill '+kind+'">'+txt+'</span>'; }
function esc(s){ return String(s).replace(/[&<>]/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }

function analyzeBank(id, data){
  const qs = (data && Array.isArray(data.questions)) ? data.questions : null;
  const r = { id:id, version:(data&&data.version!==undefined)?data.version:"(없음)", count:qs?qs.length:0, issues:[], sets:{}, multi:[], allcorrect:[], ans0:[], expEmpty:[], opts5:[], dup:[] };
  if(!qs){ r.issues.push(["err","questions 배열이 없음"]); return r; }
  const seen = new Set();
  for(const q of qs){
    const set = q.set || "(미지정)";
    r.sets[set] = (r.sets[set]||0)+1;
    if(seen.has(q.id)) r.dup.push(q.id); else seen.add(q.id);
    const a = q.ans;
    if(Array.isArray(a)){
      if(a.length===5) r.allcorrect.push(q.id); else r.multi.push(q.id+"="+JSON.stringify(a));
    } else if(a===0 || a===undefined || a===null){
      r.ans0.push(q.id);
    }
    if(!q.exp || !q.exp.s) r.expEmpty.push(q.id);
    if(!Array.isArray(q.opts) || q.opts.length!==5) r.opts5.push(q.id);
  }
  return r;
}

function renderBank(expect, r){
  const exp = expect;
  const okCount = exp ? (r.count===exp.total) : true;
  const setOk = exp ? (Object.keys(r.sets).length===exp.sets && Object.values(r.sets).every(function(v){return v===exp.perSet;})) : true;
  const hasErr = r.issues.some(function(i){return i[0]==="err";}) || r.ans0.length || r.expEmpty.length || r.opts5.length || r.dup.length || !okCount;
  const badge = hasErr ? "err" : (!setOk ? "warn" : "ok");
  const badgeTxt = badge==="ok"?"정상":(badge==="warn"?"주의":"오류");

  const setsRows = Object.entries(r.sets).sort().map(function(e){
    const k=e[0], v=e[1];
    const ok = exp ? v===exp.perSet : true;
    return "<tr><td>"+esc(k)+"</td><td class='num'>"+v+"</td><td>"+(ok?pill("ok","OK"):pill("warn",exp?("기대 "+exp.perSet):"-"))+"</td></tr>";
  }).join("");

  const list = function(arr){ return arr.length? "<span class='mono'>"+arr.slice(0,30).map(esc).join(", ")+(arr.length>30?(" …외 "+(arr.length-30)):"")+"</span>" : pill("ok","없음"); };

  return "<div class='card'>"+
    "<h2>banks/"+esc(r.id)+" "+pill(badge, badgeTxt)+"</h2>"+
    "<div class='kv'>"+
      "<div class='k'>총 문항</div><div>"+r.count+" "+(exp?(okCount?pill("ok","기대 "+exp.total+" 일치"):pill("err","기대 "+exp.total)) : "")+"</div>"+
      "<div class='k'>version</div><div class='mono'>"+esc(String(r.version))+"</div>"+
      "<div class='k'>세트 구성</div><div>"+(setOk?pill("ok","정상"):pill("warn","확인"))+"</div>"+
      "<div class='k'>ans 누락(0/없음)</div><div>"+list(r.ans0)+"</div>"+
      "<div class='k'>해설(exp.s) 빈값</div><div>"+list(r.expEmpty)+"</div>"+
      "<div class='k'>보기≠5</div><div>"+list(r.opts5)+"</div>"+
      "<div class='k'>ID 중복</div><div>"+list(r.dup)+"</div>"+
      "<div class='k'>복수정답(ans 배열)</div><div>"+list(r.multi)+"</div>"+
      "<div class='k'>전항정답([1..5])</div><div>"+list(r.allcorrect)+"</div>"+
    "</div>"+
    "<details><summary>세트별 문항 수 보기</summary>"+
      "<table><thead><tr><th>세트(회차)</th><th class='num'>문항</th><th>판정</th></tr></thead><tbody>"+setsRows+"</tbody></table>"+
    "</details>"+
  "</div>";
}

async function readBank(id){
  try{
    const snap = await getDoc(doc(db, "banks", id));
    if(!snap.exists()) return { id:id, missing:true };
    return { id:id, data: snap.data() };
  }catch(e){ return { id:id, error: e.message }; }
}

async function readManifest(){
  try{
    const snap = await getDoc(doc(db,"manifest","exams"));
    if(!snap.exists()) return { missing:true };
    return { data: snap.data() };
  }catch(e){ return { error:e.message }; }
}

async function listBankIds(){
  try{
    const cs = await getDocs(collection(db,"banks"));
    return cs.docs.map(function(d){return d.id;});
  }catch(e){ return { error:e.message }; }
}

async function run(prefixOnly){
  $("btnRun").disabled = true; $("btnCheckCert").disabled = true;
  out.innerHTML = "";
  setStatus("조회 중…");

  const man = await readManifest();
  let manHtml = "<div class='card'><h2>manifest/exams "+(man.missing?pill("warn","문서 없음"):(man.error?pill("err","읽기 실패"):pill("ok","존재")))+"</h2>";
  if(man.error) manHtml += "<div class='note'>오류: "+esc(man.error)+" (규칙상 비로그인 읽기가 막혀 있으면 관리자 로그인 후 다시 실행하세요.)</div>";
  if(man.data) manHtml += "<details open><summary>manifest 원문 보기</summary><pre>"+esc(JSON.stringify(man.data,null,2))+"</pre></details>";
  manHtml += "</div>";
  out.insertAdjacentHTML("beforeend", manHtml);

  const prefix = ($("prefix").value || "").trim();
  let ids = [];
  const listed = await listBankIds();
  if(Array.isArray(listed)){
    ids = listed;
    out.insertAdjacentHTML("beforeend", "<div class='card'><h2>banks 컬렉션 "+pill("ok",ids.length+"개 문서")+"</h2><div class='mono'>"+(ids.map(esc).join(", ")||"(없음)")+"</div></div>");
  } else {
    out.insertAdjacentHTML("beforeend", "<div class='card'><h2>banks 목록 조회 "+pill("warn","list 권한 없음")+"</h2><div class='note'>컬렉션 나열이 막혀 있어 기대 과목 키로 직접 조회합니다. (오류: "+esc(listed.error||"")+")</div></div>");
    const exp = EXPECT[prefix];
    ids = exp ? exp.subjects.map(function(s){return prefix+"__"+s;}) : [];
  }

  if(prefixOnly && prefix){
    ids = ids.filter(function(id){return id.indexOf(prefix+"__")===0;});
    const exp = EXPECT[prefix];
    if(exp){ for(const s of exp.subjects){ const k=prefix+"__"+s; if(ids.indexOf(k)<0) ids.push(k); } }
  }

  if(!ids.length){
    out.insertAdjacentHTML("beforeend", "<div class='card'>"+pill("warn","점검할 bank 문서가 없습니다.")+"</div>");
  }

  const prefixForExpect = (prefix && EXPECT[prefix]) ? prefix : null;
  ids = ids.sort();
  for(const id of ids){
    const res = await readBank(id);
    if(res.missing){
      out.insertAdjacentHTML("beforeend", "<div class='card'><h2>banks/"+esc(id)+" "+pill("err","문서 없음")+"</h2><div class='note'>업로드되지 않았거나 키 이름이 다릅니다.</div></div>");
      continue;
    }
    if(res.error){
      out.insertAdjacentHTML("beforeend", "<div class='card'><h2>banks/"+esc(id)+" "+pill("err","읽기 실패")+"</h2><div class='note'>"+esc(res.error)+"</div></div>");
      continue;
    }
    const r = analyzeBank(id, res.data);
    const exp = prefixForExpect ? EXPECT[prefixForExpect] : (EXPECT[id.split("__")[0]]||null);
    out.insertAdjacentHTML("beforeend", renderBank(exp, r));
  }

  setStatus("완료.");
  $("btnRun").disabled = false; $("btnCheckCert").disabled = false;
}

$("btnRun").addEventListener("click", function(){run(false);});
$("btnCheckCert").addEventListener("click", function(){run(true);});
$("btnLogin").addEventListener("click", async function(){
  try{ setStatus("로그인 창 여는 중…"); await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ setStatus("로그인 실패: "+e.message); }
});
onAuthStateChanged(auth, function(u){
  if(u) setStatus("로그인됨: "+ (u.email||u.uid) + " — 다시 [전체 진단 실행]을 눌러 주세요.");
});
</script>
</body>
</html>
